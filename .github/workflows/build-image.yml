name: Build & Push OpenFang Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.3.30)"
        required: false
        default: "latest"

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout openfang-setup repo
        uses: actions/checkout@v4

      - name: Checkout OpenFang source
        uses: actions/checkout@v4
        with:
          repository: Clawbuilders/openfang
          path: openfang-src

      - name: Set version tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || 'latest' }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Free up disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af
          df -h

      - name: Add swap space
        run: |
          sudo dd if=/dev/zero of=/mnt/swap bs=1M count=8192
          sudo chmod 600 /mnt/swap
          sudo mkswap /mnt/swap
          sudo swapon /mnt/swap
          free -h

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            openfang-src/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('openfang-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Build OpenFang binary natively
        working-directory: openfang-src
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
        run: cargo build --release --bin openfang

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push platform image
        run: |
          cp openfang-src/target/release/openfang .
          cp -r openfang-src/agents .
          docker build -f Dockerfile.prebuilt \
            --platform ${{ matrix.platform }} \
            -t ghcr.io/clawbuilders/openfang:${{ steps.version.outputs.tag }}-${{ matrix.arch }} \
            .
          docker push ghcr.io/clawbuilders/openfang:${{ steps.version.outputs.tag }}-${{ matrix.arch }}

      - name: Export platform image as tar.gz
        run: |
          docker save ghcr.io/clawbuilders/openfang:${{ steps.version.outputs.tag }}-${{ matrix.arch }} \
            | gzip > openfang-image-${{ matrix.arch }}.tar.gz
          echo "Image size: $(du -sh openfang-image-${{ matrix.arch }}.tar.gz | cut -f1)"

      - name: Upload platform image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openfang-image-${{ matrix.arch }}
          path: openfang-image-${{ matrix.arch }}.tar.gz
          retention-days: 1

      - name: Get OpenFang version info
        id: openfang_info
        run: |
          cd openfang-src
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "openfang_version=$VERSION" >> $GITHUB_OUTPUT
          COMMIT=$(git rev-parse --short HEAD)
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

    outputs:
      openfang_version: ${{ steps.openfang_info.outputs.openfang_version }}
      openfang_commit: ${{ steps.openfang_info.outputs.commit }}
      version_tag: ${{ steps.version.outputs.tag }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ needs.build.outputs.version_tag }}"
          docker buildx imagetools create \
            -t ghcr.io/clawbuilders/openfang:${TAG} \
            -t ghcr.io/clawbuilders/openfang:latest \
            ghcr.io/clawbuilders/openfang:${TAG}-amd64 \
            ghcr.io/clawbuilders/openfang:${TAG}-arm64

      - name: Download platform image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openfang-image-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version_tag }}
          name: "OpenFang ${{ needs.build.outputs.version_tag }}"
          body: |
            ## OpenFang Workshop Image — ${{ needs.build.outputs.version_tag }}

            Pre-built Docker image for the OpenFang setup workshop.

            ### What's included
            - OpenFang v${{ needs.build.outputs.openfang_version }} (commit `${{ needs.build.outputs.openfang_commit }}`)
            - Configured for NVIDIA NIM (`nvidia/llama-3.1-nemotron-ultra-253b-v1`)
            - Dashboard at `http://localhost:4200`
            - 7 autonomous Hands included
            - **Multi-arch**: `linux/amd64` + `linux/arm64` (Apple Silicon)

            ### Quick Start

            **Option A — Pull from GHCR (recommended, auto-selects your arch):**
            ```bash
            docker pull ghcr.io/clawbuilders/openfang:latest
            ```

            **Option B — Load from file (pick your arch):**
            ```bash
            # Apple Silicon (M1/M2/M3/M4):
            docker load < openfang-image-arm64.tar.gz

            # Intel/AMD:
            docker load < openfang-image-amd64.tar.gz
            ```

            **Run it:**
            ```bash
            docker run -d \
              --name openfang \
              -p 4200:4200 \
              -v ./workshop/openfang.toml:/data/config.toml:ro \
              --env-file ./workshop/.env \
              ghcr.io/clawbuilders/openfang:latest
            ```

            ### Requirements
            - Docker Desktop or Docker Engine
            - NVIDIA API key from https://build.nvidia.com

            ### Full setup guide
            See [README](https://github.com/Clawbuilders/openfang-setup#readme)

            ---
            Built natively on GitHub Actions (ubuntu-latest + ubuntu-24.04-arm), packaged into debian:bookworm-slim.
            Source: https://github.com/Clawbuilders/openfang
          files: |
            openfang-image-amd64.tar.gz
            openfang-image-arm64.tar.gz
          draft: false
          prerelease: false
