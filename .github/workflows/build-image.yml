name: Build & Push OpenFang Image

# Builds native binaries from RightNow-AI/openfang (public upstream) on real
# amd64 + arm64 runners, packages into debian:bookworm-slim, pushes multi-arch
# manifest to ghcr.io/clawbuilders/openfang, attaches tar.gz + oci-stack.zip
# to a GitHub Release.
#
# Trigger: Actions → "Build & Push OpenFang Image" → Run workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.5.5)"
        required: false
        default: "latest"

jobs:
  build:
    name: Build / ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout openfang-setup repo (for Dockerfile.prebuilt)
        uses: actions/checkout@v4

      - name: Checkout OpenFang source (public upstream)
        uses: actions/checkout@v4
        with:
          repository: RightNow-AI/openfang
          path: openfang-src

      - name: Set version tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || 'latest' }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Free up disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af
          df -h

      - name: Add swap space
        run: |
          sudo dd if=/dev/zero of=/mnt/swap bs=1M count=8192
          sudo chmod 600 /mnt/swap
          sudo mkswap /mnt/swap
          sudo swapon /mnt/swap
          free -h

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            openfang-src/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('openfang-src/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build OpenFang binary (native — no QEMU)
        working-directory: openfang-src
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
        run: cargo build --release --bin openfang

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push platform image
        run: |
          cp openfang-src/target/release/openfang .
          cp -r openfang-src/agents .
          docker build -f Dockerfile.prebuilt \
            --platform ${{ matrix.platform }} \
            -t ghcr.io/clawbuilders/openfang:${{ steps.version.outputs.tag }}-${{ matrix.arch }} \
            .
          docker push ghcr.io/clawbuilders/openfang:${{ steps.version.outputs.tag }}-${{ matrix.arch }}

      - name: Export image as tar.gz
        run: |
          docker save ghcr.io/clawbuilders/openfang:${{ steps.version.outputs.tag }}-${{ matrix.arch }} \
            | gzip > openfang-image-${{ matrix.arch }}.tar.gz
          echo "Image size: $(du -sh openfang-image-${{ matrix.arch }}.tar.gz | cut -f1)"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openfang-image-${{ matrix.arch }}
          path: openfang-image-${{ matrix.arch }}.tar.gz
          retention-days: 1

      - name: Get version info
        id: info
        working-directory: openfang-src
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "openfang_version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    outputs:
      openfang_version: ${{ steps.info.outputs.openfang_version }}
      openfang_commit:  ${{ steps.info.outputs.commit }}
      version_tag:      ${{ steps.version.outputs.tag }}

  manifest:
    name: Multi-arch Manifest + Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout (for deploy/terraform assets)
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ needs.build.outputs.version_tag }}"
          docker buildx imagetools create \
            -t ghcr.io/clawbuilders/openfang:${TAG} \
            -t ghcr.io/clawbuilders/openfang:latest \
            ghcr.io/clawbuilders/openfang:${TAG}-amd64 \
            ghcr.io/clawbuilders/openfang:${TAG}-arm64

      - name: Package OCI Resource Manager stack
        run: |
          cd deploy
          zip -r ../oci-stack.zip .
          echo "Stack size: $(du -sh ../oci-stack.zip | cut -f1)"

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openfang-image-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version_tag }}
          name: "OpenFang ${{ needs.build.outputs.version_tag }}"
          body: |
            ## OpenFang ${{ needs.build.outputs.version_tag }}

            Pre-built multi-arch Docker image — no Rust install, no compilation.

            ### What's included
            - OpenFang v${{ needs.build.outputs.openfang_version }} (commit `${{ needs.build.outputs.openfang_commit }}`)
            - Configured for NVIDIA NIM (`nvidia/llama-3.1-nemotron-ultra-253b-v1`)
            - Dashboard at `http://localhost:4200`
            - Multi-arch: `linux/amd64` + `linux/arm64` (Apple Silicon, Oracle Ampere A1)

            ### Quick Start

            **Option A — Pull from GHCR:**
            ```bash
            docker pull ghcr.io/clawbuilders/openfang:latest
            ```

            **Option B — Load from file:**
            ```bash
            # Apple Silicon / Oracle Ampere A1 (ARM64):
            docker load < openfang-image-arm64.tar.gz

            # Intel / AMD (x86_64):
            docker load < openfang-image-amd64.tar.gz
            ```

            **Run:**
            ```bash
            git clone https://github.com/Clawbuilders/openfang-setup.git
            cd openfang-setup
            cp workshop/.env.example workshop/.env
            # Edit workshop/.env — add your NVIDIA_API_KEY
            docker run -d \
              --name openfang \
              -p 4200:4200 \
              -v ./workshop/openfang.toml:/data/config.toml:ro \
              --env-file ./workshop/.env \
              ghcr.io/clawbuilders/openfang:latest
            ```

            ### Deploy to Oracle Cloud (Free Tier — 24/7)
            [![Deploy to Oracle Cloud](https://oci-resourcemanager-plugin.plugins.oci.oraclecloud.com/latest/deploy-to-oracle-cloud.svg)](https://cloud.oracle.com/resourcemanager/stacks/create?zipUrl=https://github.com/Clawbuilders/openfang-setup/releases/latest/download/oci-stack.zip)

            ---
            Built from [RightNow-AI/openfang](https://github.com/RightNow-AI/openfang) on GitHub Actions (ubuntu-latest + ubuntu-24.04-arm).
          files: |
            openfang-image-amd64.tar.gz
            openfang-image-arm64.tar.gz
            oci-stack.zip
          draft: false
          prerelease: false
